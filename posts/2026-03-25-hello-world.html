  <script>try{if(localStorage.getItem('theme')==='dark')document.documentElement.setAttribute('data-theme','dark')}catch(e){}</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400;1,6..72,500&family=JetBrains+Mono:wght@400;500&display=swap">
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <div class="progress-bar" id="progress-bar"></div>
  <div class="layout">
    <header class="site-header">
      <div class="header-left">
        <a href="../index.html" class="wordmark">Jorg Sowa</a>
        <nav>
          <a href="../index.html" class="active">Writing</a>
          <a href="../about.html">About</a>
        </nav>
      </div>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
        <span class="theme-icon"></span>
      </button>
    </header>

    <main>
      <a class="back-link" href="../index.html">← Writing</a>

      <article>
        <h1>Hello World</h1>
        <time class="meta" datetime="2026-03-25">March 25, 2026</time>

        <p>This is a test post. Writing here is simple — just edit this HTML file and duplicate it for new posts.</p>

      <footer class="site">

        <div class="links">
          <a href="https://github.com/jorgsowa">GitHub</a>
          <a href="mailto:jorg.sowa@gmail.com">Email</a>
        </div>
      </footer>
    </main>
  </div>

  <script>
    (function () {
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          document.documentElement.classList.add('transitions-ready');
        });
      });
      var toggle = document.getElementById('theme-toggle');
      if (toggle) {
        toggle.addEventListener('click', function () {
          var html = document.documentElement;
          var next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
          html.setAttribute('data-theme', next);
          try { localStorage.setItem('theme', next); } catch (e) {}
        });
      }
      var bar = document.getElementById('progress-bar');
      if (bar) {
        window.addEventListener('scroll', function () {
          var d = document.documentElement;
          var pct = d.scrollTop / (d.scrollHeight - d.clientHeight) * 100;
          bar.style.width = Math.min(pct, 100) + '%';
        }, { passive: true });
      }
    })();
  </script>
</body>
</html>
